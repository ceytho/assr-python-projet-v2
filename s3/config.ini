[s3]
bucket = noaa-gsod-pds
region = us-east-1
; clés des fichiers à télécharger, séparées par des virgules
keys = 2025/A5125600451.csv
#keys = 2025/A5125600451.csv,2025/A0735500241.csv

[filter]
; plage de températures acceptées (en degrés Fahrenheit)
; les enregistrements hors de cette plage et les valeurs manquantes sont exclus
min_temp_f = -50
max_temp_f = 130

[output]
csv_path = ./output.csv
report_path = ./report.json
