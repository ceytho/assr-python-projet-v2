[server]
host = 127.0.0.1
port = 8080

[hubeau]
api_url = https://hubeau.eaufrance.fr/api/v1/qualite_eau_potable/resultats_dis
code_parametre = 1345

[cache]
; duree de vie des entrees en cache, en secondes
ttl = 300

[rate_limit]
; nombre maximum de requetes autorisees par IP sur la fenetre de temps
max_requests = 10
window_seconds = 60
